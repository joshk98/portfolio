<!DOCTYPE html>
<html>
<head>
    <title>Contact</title>
</head>
<body>
    <header>
        <h1>Contact Me!</h1>
    </header>
    <br />
    <p>Please contact me by filling in the form below.</p>
    <form>
        <fieldset>
            <legend>Personal details</legend>

            <label for="username">Your name</label>
            <input id="username" type="text">
            <br>
            <label for="useremail">Your email</label>
            <input id="useremail" type="email">
            <br>
            <label for="contactreason">Reason for contacting</label>
            <br>
            <select name="contactreason">
                <option value="generalinquiry" selected>General Inquiry</option>
                <option value="businessinquiry">Business Inquiry</option>
                <option value="fanclubinquiry">I'm from Josh's fanclub!</option>
            </select>
            <br>
            <label for="additionalcomments">Additional comments?</label>
            <br>
            <textarea id="additionalcomments"></textarea>
            <br>
        </fieldset>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
